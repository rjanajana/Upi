<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - UPI Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .login-form {
            background: white;
            max-width: 400px;
            margin: 50px auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .admin-panel {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .payments-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .section-header {
            background: #34495e;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .payments-table {
            width: 100%;
            border-collapse: collapse;
        }

        .payments-table th,
        .payments-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        .payments-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-paid {
            background: #d4edda;
            color: #155724;
        }

        .verify-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .verify-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5ff;
            border-radius: 8px;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .error {
            background: #ff4757;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .success {
            background: #2ed573;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        @media (max-width: 768px) {
            .payments-table {
                font-size: 14px;
            }
            
            .payments-table th,
            .payments-table td {
                padding: 10px 5px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔐 Admin Panel</h1>
        <p>UPI Payment Gateway Management</p>
    </div>

    <!-- Login Form -->
    <div class="login-form" id="loginForm">
        <h2 style="text-align: center; margin-bottom: 30px; color: #2c3e50;">Admin Login</h2>
        
        <form id="adminLoginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="admin" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" value="admin123" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="error" id="loginError"></div>
    </div>

    <!-- Admin Panel -->
    <div class="container admin-panel" id="adminPanel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>Dashboard</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalPayments">0</div>
                <div class="stat-label">Total Payments</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingPayments">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completedPayments">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRevenue">₹0</div>
                <div class="stat-label">Total Revenue</div>
            </div>
        </div>

        <!-- Payments Table -->
        <div class="payments-section">
            <div class="section-header">
                <h3>All Payments</h3>
                <button class="refresh-btn" onclick="loadPayments()">🔄 Refresh</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table class="payments-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Amount</th>
                            <th>Customer</th>
                            <th>Status</th>
                            <th>UTR</th>
                            <th>Created</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsTableBody">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 40px;">
                                Loading payments...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
    </div>

    <script>
        const API_BASE = '';
        let isLoggedIn = false;

        // Login form submission
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    isLoggedIn = true;
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadPayments();
                } else {
                    showLoginError('Invalid credentials');
                }
            } catch (error) {
                console.error('Login error:', error);
                showLoginError('Login failed. Please try again.');
            }
        });

        async function loadPayments() {
            if (!isLoggedIn) return;

            try {
                const response = await fetch(`${API_BASE}/api/admin/payments`);
                const data = await response.json();

                if (data.success) {
                    displayPayments(data.payments);
                    updateStatistics(data.payments);
                } else {
                    showError('Failed to load payments');
                }
            } catch (error) {
                console.error('Error loading payments:', error);
                showError('Failed to load payments');
            }
        }

        function displayPayments(payments) {
            const tbody = document.getElementById('paymentsTableBody');
            
            if (payments.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: #666;">
                            No payments found
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = payments.map(payment => `
                <tr>
                    <td style="font-family: monospace; font-size: 12px;">${payment.orderId}</td>
                    <td style="font-weight: 600;">₹${payment.amount}</td>
                    <td>${payment.customerName || 'Anonymous'}</td>
                    <td>
                        <span class="status-badge status-${payment.status}">
                            ${payment.status}
                        </span>
                    </td>
                    <td style="font-family: monospace; font-size: 12px;">
                        ${payment.utr || '-'}
                    </td>
                    <td style="font-size: 12px;">
                        ${new Date(payment.createdAt).toLocaleString()}
                    </td>
                    <td>
                        ${payment.status === 'pending' ? 
                            `<button class="verify-btn" onclick="verifyPayment('${payment.orderId}')">
                                Verify
                            </button>` : 
                            '<span style="color: #28a745;">✓ Verified</span>'
                        }
                    </td>
                </tr>
            `).join('');
        }

        function updateStatistics(payments) {
            const total = payments.length;
            const pending = payments.filter(p => p.status === 'pending').length;
            const completed = payments.filter(p => p.status === 'paid').length;
            const revenue = payments
                .filter(p => p.status === 'paid')
                .reduce((sum, p) => sum + p.amount, 0);

            document.getElementById('totalPayments').textContent = total;
            document.getElementById('pendingPayments').textContent = pending;
            document.getElementById('completedPayments').textContent = completed;
            document.getElementById('totalRevenue').textContent = `₹${revenue}`;
        }

        async function verifyPayment(orderId) {
            if (!confirm(`Manually verify payment for order ${orderId}?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/admin/verify-payment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ orderId })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('Payment verified successfully');
                    loadPayments(); // Refresh the table
                } else {
                    showError(data.error || 'Failed to verify payment');
                }
            } catch (error) {
                console.error('Error verifying payment:', error);
                showError('Failed to verify payment');
            }
        }

        function logout() {
            isLoggedIn = false;
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = 'admin123';
        }

        function showLoginError(message) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        // Auto-refresh payments every 30 seconds
        setInterval(() => {
            if (isLoggedIn) {
                loadPayments();
            }
        }, 30000);
    </script>
</body>
</html>
