services:
  - type: web
    name: ritwik-upi-gateway
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: UPI_ID
        value: 7477772650@ibl
      - key: MERCHANT_NAME
        value: Ritwik Store
      - key: BUSINESS_NAME
        value: Ritwik Jana
      - key: ADMIN_USERNAME
        value: ritwik
      - key: ADMIN_PASSWORD
        value: Ritwik@2025#Secure
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
    
    autoDeploy: true
    
    disk:
      name: ritwik-payment-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

# Custom domain (optional)
customDomains:
  - name: ritwik-upi.onrender.com
  
